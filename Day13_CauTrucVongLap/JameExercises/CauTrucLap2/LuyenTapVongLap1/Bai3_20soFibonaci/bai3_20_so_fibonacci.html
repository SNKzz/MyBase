<script>
    let count = 2;
    let number1 = 1;
    let number2 = 2;
    document.write("1> " + number1 + "<br>");
    document.write("2> " + number2 + "<br>")
    while (count < 20) {
        let temp = number2;
        number2 += number1;
        number1 = temp;

        count++;
        document.write(count + "> " + number2 + "<br>");
    }
</script>
