<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="input_number" oninput="check(this.value)">
    <p id="text_result"></p>
</body>

<script>
    let textResult = document.getElementById("text_result");
    function check(value) {
        if (value > 0) {
            textResult.innerText = "TRUE"
        } else {
            textResult.innerText = "FALSE"
        }
    }
</script>

</html>
