<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Old but gold</title>
    <link rel="stylesheet" href="style_caculator2.css" />
    <!-- <script src="https://unpkg.com/mathjs/lib/browser/math.js"></script> -->
  </head>
  <body>
    <h1>Calculator Application</h1>
    <table border="1" cellpadding="10px" cellspacing="10px">
      <tr>
        <th colspan="4">
          <h2 id="input"></h2>
        </th>
      </tr>
      <tr>
        <td
          id="input_openleft"
          style="background-color: rgb(205, 255, 255)"
          onclick="createMath('(')"
        >
          &#40;
        </td>
        <td
          id="input_openright"
          style="background-color: rgb(205, 255, 255)"
          onclick="createMath(')')"
        >
          &#41;
        </td>
        <td
          id="input_clearall"
          style="background-color: rgb(205, 255, 255)"
          onclick="inputdata_clearall()"
        >
          C
        </td>
        <td
          id="input_clear1"
          style="background-color: rgb(205, 255, 255)"
          onclick="inputdata_clear1()"
        >
          D
        </td>
      </tr>
      <tr>
        <td id="input_num_7" onclick="createMath('7')">7</td>
        <td id="input_num_8" onclick="createMath('8')">8</td>
        <td id="input_num_9" onclick="createMath('9')">9</td>
        <td
          id="input_add"
          style="background-color: rgb(205, 255, 255)"
          onclick="createMath(' + ')"
        >
          +
        </td>
      </tr>
      <tr>
        <td id="input_num_4" onclick="createMath('4')">4</td>
        <td id="input_num_5" onclick="createMath('5')">5</td>
        <td id="input_num_6" onclick="createMath('6')">6</td>
        <td
          id="input_sub"
          style="background-color: rgb(205, 255, 255)"
          onclick="createMath(' - ')"
        >
          -
        </td>
      </tr>
      <tr>
        <td id="input_num_1" onclick="createMath('1')">1</td>
        <td id="input_num_2" onclick="createMath('2')">2</td>
        <td id="input_num_3" onclick="createMath('3')">3</td>
        <td
          id="input_mul"
          style="background-color: rgb(205, 255, 255)"
          onclick="createMath(' * ')"
        >
          x
        </td>
      </tr>
      <tr>
        <td id="input_num_0" onclick="createMath('0')">0</td>
        <td id="input_dat" onclick="createMath('.')">.</td>
        <td
          id="input_mod"
          style="background-color: rgb(205, 255, 255)"
          onclick="createMath(' % ')"
        >
          %
        </td>
        <td
          id="input_div"
          style="background-color: rgb(205, 255, 255)"
          onclick="createMath(' / ')"
        >
          /
        </td>
      </tr>
      <tr>
        <td
          id="action_caculate"
          style="background-color: rgb(69, 152, 203)"
          onclick="caculate()"
          colspan="4"
        >
          =
        </td>
      </tr>
    </table>
  </body>
  <script src="caculator2.js"></script>
</html>
