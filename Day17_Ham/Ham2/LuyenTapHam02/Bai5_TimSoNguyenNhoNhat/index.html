<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arrayInput = [];
        for (let i = 0; i < 3; i++) {
            let number = Number(prompt(`Nhap vao so thu ${i + 1}:`));
            arrayInput[i] = number;
        }
        function findMin(array) {
            let min = array[0];
            for (let i = 0; i < array.length; i++) {
                if (array[i] < min) {
                    min = array[i];
                }
            }
            alert(`=> Gia tri nho nhat la ${min}`);
        }

        findMin(arrayInput);
    </script>
</body>

</html>
