<script>
    let myColor = ["Red", "Green", "White", "Black"];
    myColor = myColor.reverse();
    let result = "";
    // for (let i = 0; i < myColor.length; i++) {
    //     result += myColor[i] + ", ";
    // }
    while (myColor.length != 0) {
        if (myColor.length == 1) {
            result += myColor.pop();
        } else {
            result += myColor.pop() + ","
        }
    }

    document.write(result);
</script>
