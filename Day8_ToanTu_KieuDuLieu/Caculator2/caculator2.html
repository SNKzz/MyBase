<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old but gold</title>
    <link rel = "stylesheet" href="style_caculator2.css">
    <script src="https://unpkg.com/mathjs/lib/browser/math.js"></script>
</head>
<body>
    <h1>Caculator Application</h1>
    <table border="1" cellpadding="10px" cellspacing="10px">
        <tr>
            <th colspan="4">
               <h2 id="input"></h2>
            </th>
          
        </tr>
        <tr>
            <td id="input_openleft" style="background-color: rgb(205, 255, 255);" onclick="inputdata_openleft()">(</td>
            <td id="input_openright" style="background-color: rgb(205, 255, 255);" onclick="inputdata_openright()">)</td>
            <td id="input_clearall" style="background-color: rgb(205, 255, 255);" onclick="inputdata_clearall()">C</td>
            <td id="input_clear1" style="background-color: rgb(205, 255, 255);" onclick="inputdata_clear1()">D</td>
        </tr>
        <tr>
            <td id="input_num_7" onclick="inputdata_num_7()">7</td>
            <td id="input_num_8" onclick="inputdata_num_8()">8</td>
            <td id="input_num_9" onclick="inputdata_num_9()">9</td>
            <td id="input_add" style="background-color: rgb(205, 255, 255);" onclick="inputdata_add()">+</td>
        </tr>
        <tr>
            <td id="input_num_4" onclick="inputdata_num_4()">4</td>
            <td id="input_num_5" onclick="inputdata_num_5()">5</td>
            <td id="input_num_6" onclick="inputdata_num_6()">6</td>
            <td id="input_sub" style="background-color: rgb(205, 255, 255);" onclick="inputdata_sub()">-</td>
        </tr>
        <tr>
            <td id="input_num_1" onclick="inputdata_num_1()">1</td>
            <td id="input_num_2" onclick="inputdata_num_2()">2</td>
            <td id="input_num_3" onclick="inputdata_num_3()">3</td>
            <td id="input_mul" style="background-color: rgb(205, 255, 255);" onclick="inputdata_mul()">x</td>
        </tr>
        <tr>
            <td id="input_num_0" onclick="inputdata_num_0()">0</td>
            <td id="input_dat" onclick="inputdata_dat()">.</td>
            <td id="input_mod" style="background-color: rgb(205, 255, 255);" onclick="inputdata_mod()">%</td>
            <td id="input_div" style="background-color: rgb(205, 255, 255);" onclick="inputdata_div()">/</td>
        </tr>
        <tr>
            <td id="action_caculate" style="background-color: rgb(69, 152, 203);" onclick="caculate()" colspan="4">=</td>
        </tr>
    </table>
</body>
<script src="caculator2.js"></script>
</html>
