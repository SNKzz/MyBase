<script>
    while (true) {
        let tem = Number(prompt("Nhap vao nhiet do: "));
        if (tem > 100) {
            alert("Vui long giam nhiet do!");
            break;
        } else if (tem < 20) {
            alert("Vui long tang nhiet do!");
            break;
        } else {
            continue;
        }
    }
</script>
