<script>
    let array = [-1, 23, -4, 14, -233, 3123, -3, 31];
    document.write(`Mang ban dau ${array} <br>`);
    let number = -3;
    let check = array.indexOf(number)
    if (check == -1) {
        document.write(`=> So ${number} khong co o trong mang!`);
    } else {
        document.write(`=> So ${number} co o trong mang tai vi tri thu ${check}!<br>`);
        array.splice(check, 1);
        array[array.length - 1] = 0;
        document.write(`=> Mang moi: ${array}`);
    }
</script>
