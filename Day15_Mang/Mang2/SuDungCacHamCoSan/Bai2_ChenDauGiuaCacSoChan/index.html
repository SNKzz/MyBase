<script>
    let input = "025468";
    let result = "";

    let arrayChar = input.split("");
    for (let i = 0; i < arrayChar.length; i++) {
        let valueChar = Number(arrayChar[i]);
        let nextChar = Number(arrayChar[i + 1])
        if (valueChar % 2 == 0 && nextChar % 2 == 0) {
            result += valueChar + "-"
        } else {
            result += valueChar
        }
    }

    document.write(result);
</script>
