<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
</body>
<script>
    let start = 0;
    document.write(start + "<br>")
    let count = 1;
    let sum = 0;

    while (count < 30) {
        start += 7;
        sum += start;
        count++;
        document.write(start + "<br>");
    }

    document.write("=> Tong 30 so dau tien chia het cho 7 la: " + sum);
</script>

</html>
