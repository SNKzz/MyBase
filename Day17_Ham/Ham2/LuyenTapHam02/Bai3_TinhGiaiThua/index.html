<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="input_number" oninput="caculate(this.value)" placeholder="">
    <p id="text_result"></p>
</body>

<script>
    let textResult = document.getElementById("text_result");
    function caculate(number) {
        let result = 1;
        for (let i = 2; i <= number; i++) {
            result *= i;
        }

        textResult.innerText = `${number}! = ${result}`;
    }
</script>

</html>
