<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input id="input_number" oninput="caculate(this.value)" placeholder="Nhap vao ban kinh cua hinh tron">
    <p id="text_result"></p>
</body>

<script>
    let textResult = document.getElementById("text_result");
    function caculate(number) {
        let chuVi = number * 2 * Math.PI;
        let dienTich = Math.pow(number, 2) * Math.PI
        let result = `Chu vi: ${chuVi.toFixed(2)} \n Dien tich: ${dienTich.toFixed(2)}`;
        textResult.innerText = result;
    }
</script>

</html>
