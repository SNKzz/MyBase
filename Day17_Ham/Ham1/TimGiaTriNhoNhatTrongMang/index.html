<script>
    let array1 = [3, 5, 1, 8, -3, 7, 8];
    let array2 = [7, 12, 6, 9, 20, 56, 89];
    let array3 = [];
    let array4 = [0, 0, 0, 0, 0, 0];

    function findMin(array) {
        if (array.length > 0) {
            let min = array[0];
            document.write("Mang ban dau: " + array + "<br>");
            for (let i = 0; i < array.length; i++) {
                if (array[i] < min) min = array[i]
            }
            document.write("=> Min = " + min + "<br>");
        } else {
            document.write("Mang rong !!<br>")
        }
    }

    findMin(array1);
    findMin(array2);
    findMin(array3);
    findMin(array4);

</script>
