<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <text onclick="increase(5)">Click me</text>
    <p id="text_result"></p>
</body>
<script>
    function increase(a) {
        let result = a + 1;
        document.getElementById("text_result").innerText = result;
    }
</script>

</html>
