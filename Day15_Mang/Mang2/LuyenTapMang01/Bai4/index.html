<script>
    let array = [1, 23, 4, 14, 233, 3123, 3, 31];
    document.write(`Mang ban dau ${array} <br>`);

    let newArray = [];
    for (let i = array.length - 1; i >= 0; i--) {
        newArray.push(array.pop());
    }
    document.write(`=> Mang sau khi duoc dao nguoc: ${newArray}`);
</script>
