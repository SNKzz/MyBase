<!DOCTYPE html>

<script>
    let array = [0, 1, 3, 45, 12, 51, 5, 6, 2, 1];
    let inputArray = "[";
    let max = 0;

    for (let i = 0; i < array.length; i++) {
        if (i == array.length - 1) {
            inputArray += array[i];
        } else {
            inputArray += array[i] + ", ";
        }

    }
    inputArray += "]";
    document.write("Mang ban dau: " + inputArray + "<br>");

    for (let i = 0; i < array.length; i++) {
        if (array[i] > max) {
            max = array[i];
        }
    }
    document.write(`=> Gia tri lon nhat trong mang la ${max}`);
</script>

</html>
